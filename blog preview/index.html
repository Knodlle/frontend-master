<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Blog card</title>
</head>
<body>
    <div class="container">
        <div class="card">
            <img class="content-img" src="blog-preview-card-main/assets/images/illustration-article.svg" alt="img">
            <div class="text">
                <p class="learning">Learning</p>
                <p class="date">Published 21 Dec 2023</p>
                <h1 class="title">HTML & CSS foundations</h1>
                <p class="description">These languages are the backbone of every website, defining strucure, content and presentation
                </p>
            </div>
            <div class="user">
                <img class= "user-img" src="blog-preview-card-main/assets/images/image-avatar.webp" alt="user">
                <p>Username</p>
            </div>
        </div>
    </div>
</body>
</html>
